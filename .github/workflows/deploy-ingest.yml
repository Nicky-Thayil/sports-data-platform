name: Deploy Ingest

on:
  push:
    branches:
      - main
    paths:
      - "services/ingest/**"
      - "shared/**"

env:
  PROJECT_ID: apex-sports-platform
  REGION: us-east1
  IMAGE: us-east1-docker.pkg.dev/apex-sports-platform/apex/apex-ingest

jobs:
  deploy:
    name: Build & Deploy Ingest
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            -f services/ingest/Dockerfile \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Update Cloud Run Jobs
        run: |
          for JOB in sync-pl-standings sync-pl-fixtures sync-f1-races sync-f1-drivers sync-f1-lap-times; do
            gcloud run jobs update $JOB \
              --image ${{ env.IMAGE }}:${{ github.sha }} \
              --region ${{ env.REGION }}
          done